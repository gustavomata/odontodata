name: Build & Deploy OdontoData

on:
  push:
    branches: [main]
  # Permite rodar manualmente pelo GitHub
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # Job 1: Build e testes
  # ============================================================
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build da aplicacao
        run: npm run build

      # Salva o build para o job de deploy
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            .next/
            public/
            package.json
            package-lock.json
            next.config.ts
          retention-days: 1

  # ============================================================
  # Job 2: Deploy no servidor via SSH
  # ============================================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    # Só faz deploy na branch main
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            # Diretorio correto do projeto
            APP_DIR="/var/www/odontodata/odontodata"
            cd $APP_DIR

            # Pull das ultimas mudancas
            git pull origin main

            # Instala dependencias
            npm ci --production=false

            # Build da aplicacao
            npm run build

            # Reinicia na porta 3001 (porta 3000 ocupada por outro app)
            export PORT=3001
            pm2 describe odontodata > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              PORT=3001 pm2 restart odontodata --update-env
            else
              PORT=3001 pm2 start npm --name "odontodata" -- start
            fi

            pm2 save
            echo "Deploy concluido com sucesso na porta 3001!"
